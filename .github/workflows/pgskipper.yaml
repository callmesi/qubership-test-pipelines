name: Pgskipper Tests

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      repository_name:
        description: Repository with Pgskipper service
        required: false
        type: string
        default: callmesi/pgskipper-operator
      service_branch:
        description: Branch of pgskipper-operator repository
        required: false
        type: string
        default: main
      pipeline_branch:
        description: Branch of qubership-test-pipelines repository
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      scope:
        description: Pgskipper Test Scope (pr, nightly or hardening)
        type: string
        required: false
        default: pr
      service_versions_json:
        description: PostgreSQL image versions as JSON
        type: string
        required: false
        default: |
          [
            "pgskipper-docker-patroni-16",
            "pgskipper-docker-patroni-17",
            "pgskipper-docker-patroni-18"
          ]
      skip_tests:
        description: Skip all tests (for doc-only changes)
        type: boolean
        required: false
        default: false

  workflow_call:
    inputs:
      repository_name:
        description: Repository with Pgskipper service
        required: false
        type: string
        default: callmesi/pgskipper-operator
      service_branch:
        description: Branch of pgskipper-operator repository
        required: false
        type: string
        default: main
      pipeline_branch:
        description: Branch of qubership-test-pipelines repository
        type: string
        required: true
      runner_type:
        description: Runner type (self-hosted or ubuntu-latest)
        type: string
        required: false
        default: ubuntu-latest
      scope:
        description: Pgskipper Test Scope (pr, nightly or hardening)
        type: string
        required: false
        default: pr
      service_versions_json:
        description: PostgreSQL image versions as JSON
        type: string
        required: false
        default: |
          [
            "pgskipper-docker-patroni-16",
            "pgskipper-docker-patroni-17",
            "pgskipper-docker-patroni-18"
          ]
      skip_tests:
        description: Skip all tests (for doc-only changes)
        type: boolean
        required: false
        default: false

    secrets:
      AWS_S3_ACCESS_KEY_ID:
        required: true
      AWS_S3_ACCESS_KEY_SECRET:
        required: true

jobs:
  prepare:
    if: ${{ !inputs.skip_tests }}
    runs-on: ${{ inputs.runner_type }}
    outputs:
      versions: ${{ steps.process-versions.outputs.versions }}
      previous_version: ${{ steps.process-versions.outputs.previous_version }}
      matrix: ${{ steps.process-versions.outputs.matrix }}
      service_images: ${{ steps.parse-matrix.outputs.service_images }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.service_branch }}
          repository: ${{ inputs.repository_name }}
          path: pgskipper-operator
          persist-credentials: false

      - name: Checkout pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: ${{ github.repository_owner }}/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false

      - name: Get latest tag
        id: get-latest-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repository_name }}
        run: |
          LATEST_TAG=$(gh api repos/${REPO_NAME}/releases/latest --jq '.tag_name')
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Process versions file and matrix generation
        id: process-versions
        env:
          SCOPE: ${{ inputs.scope }}
          LATEST_TAG: ${{ steps.get-latest-tag.outputs.latest_tag }}
          SERVICE_BRANCH: ${{ inputs.service_branch }}
        working-directory: ${{ github.workspace }}/qubership-test-pipelines
        run: |
          chmod +x ./scripts/matrix.sh
          if [[ "$SCOPE" == "nightly" ]]; then
            CONFIG_FILE="./workflow-config/pgskipper_nightly.yaml"
          elif [[ "$SCOPE" == "pr" ]]; then
            CONFIG_FILE="./workflow-config/pgskipper.yaml"
          elif [[ "$SCOPE" == "hardening" ]]; then
            CONFIG_FILE="./workflow-config/pgskipper_hardening.yaml"
          else
            echo "::error::Invalid scope parameter '$SCOPE'. Must be 'pr', 'nightly' or 'hardening'."
            exit 1
          fi
          ./scripts/matrix.sh "$LATEST_TAG" "$CONFIG_FILE" "$SERVICE_BRANCH"

      - name: Parse JSON into matrix
        id: parse-matrix
        env:
          VERSIONS_JSON: ${{ inputs.service_versions_json }}
        run: |
          IMAGES=$(echo "$VERSIONS_JSON" | jq -c '.')
          echo "PG Images: $IMAGES"
          echo "service_images=$IMAGES" >> $GITHUB_OUTPUT

  Pgskipper-Test-Cases:
    if: ${{ !inputs.skip_tests }}
    needs: prepare
    runs-on: ${{ inputs.runner_type }}
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.prepare.outputs.matrix) }}
        service_image: ${{ fromJson(needs.prepare.outputs.service_images) }}
    name: ${{ matrix.service_image }} | ${{ matrix.test.name }}
    steps:
      # == 01 Start ======= Common pre-steps for all tests =======
      - name: Print job parameters
        env:
          MATRIX_JSON: ${{ toJson(matrix.test) }}
        run: |
          echo "======== Job parameters ======="
          echo "$MATRIX_JSON"

      - name: Checkout pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false

      - name: Free Disk Space (Ubuntu)
        if: inputs.runner_type == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Create cluster
        uses: ./qubership-test-pipelines/actions/shared/create_cluster
      # == 01 End ======= Common pre-steps for all tests =======

      # == Start TLS certs addition if needed =======
      - name: TLS setup
        # language=bash
        if: matrix.test.tls == true
        run: |
          echo "::group::Install cert-manager"
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm upgrade --install cert-manager jetstack/cert-manager --namespace cert-manager \
            --create-namespace --version v1.16.3 --set prometheus.enabled=true   --set crds.enabled=true
          echo "::endgroup::"
          echo "::group::Create cert-manager entities"
          kubectl apply -f qubership-test-pipelines/resources/test-issuer.yaml
          sleep 10s
          kubectl apply -f qubership-test-pipelines/resources/test-certificate.yaml
          sleep 10s
          kubectl apply -f qubership-test-pipelines/resources/test-clusterissuer.yaml
          echo "::endgroup::"
          echo "::group::Get cert-manager resources"
          kubectl get pods -n cert-manager
          kubectl get secrets -n cert-manager
          kubectl get certificates -A
          echo "::endgroup::"
          echo "::group:: Get clusterissuer"
          kubectl get clusterissuer
          kubectl get clusterissuer test-clusterissuer -o yaml
          echo "::endgroup::"
      # == End TLS certs addition if needed =======

      # == Start ======= Specific steps for Allure report =======
      - name: Add s3 bucket for Allure report
        if: matrix.test.allure == true
        run: >-
          python qubership-test-pipelines/scripts/update_yaml.py
          --file='qubership-test-pipelines/${{ matrix.test.core_template }}'
          --path='tests/atpReport/atpStorage/username'
          --value='${{secrets.AWS_S3_ACCESS_KEY_ID}}'
          && python qubership-test-pipelines/scripts/update_yaml.py
          --file='qubership-test-pipelines/${{ matrix.test.core_template }}'
          --path='tests/atpReport/atpStorage/password'
          --value='${{secrets.AWS_S3_ACCESS_KEY_SECRET}}'
          && python qubership-test-pipelines/scripts/update_yaml.py
          --file='qubership-test-pipelines/${{ matrix.test.services_template }}'
          --path='tests/atpReport/atpStorage/username'
          --value='${{secrets.AWS_S3_ACCESS_KEY_ID}}'
          && python qubership-test-pipelines/scripts/update_yaml.py
          --file='qubership-test-pipelines/${{ matrix.test.services_template }}'
          --path='tests/atpReport/atpStorage/password'
          --value='${{secrets.AWS_S3_ACCESS_KEY_SECRET}}'
      # == End ======= Specific steps for Allure report =======

      # == 02 Start ======= Core installation steps =======
      - name: Print install deployment parameters (core)
        run: cat qubership-test-pipelines/${{ matrix.test.core_template }}

      - name: Install Pgskipper Core [${{ matrix.test.install_version }}]
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: core_install
        with:
          path_to_template: ${{ matrix.test.core_template }}
          service_branch: ${{ matrix.test.install_version }}
          deploy_mode: install
          restricted: ${{ matrix.test.restricted }}
          service_name: pgskipper
          repository_name: callmesi/pgskipper-operator
          path_to_chart: operator/charts/patroni-core
          namespace: pgskipper
          resource_folder: ""
          image_replacement: ${{ matrix.service_image }}

      - name: Sleep after core install
        run: sleep 10s

      - name: Verify Pgskipper Core installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          check_tests: ${{ matrix.test.check_core_tests }}
          namespace: pgskipper
          service_ready_max_retries: 240
          service_ready_retry_interval: 10s
          test_completion_max_retries: 240
          test_completion_retry_interval: 10s
          crd_list: patronicores.netcracker.com

      - name: Collect Diagnostics Core installation
        if: ${{ !cancelled() && steps.core_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: pgskipper
          artifact_name: Core_Installation_${{ matrix.service_image }}_${{ matrix.test.artifact_name }}
          service_branch: ${{ matrix.test.install_version }}
      # == 02 End ======= Core installation steps =======

      # == 03 Start ======= Services installation steps =======
      - name: Print install deployment parameters (services)
        run: cat qubership-test-pipelines/${{ matrix.test.services_template }}

      - name: Install Pgskipper Services [${{ matrix.test.install_version }}]
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: services_install
        with:
          path_to_template: ${{ matrix.test.services_template }}
          service_branch: ${{ matrix.test.install_version }}
          service_name: pgskipper-services
          restricted: ${{ matrix.test.restricted }}
          repository_name: callmesi/pgskipper-operator
          path_to_chart: operator/charts/patroni-services
          namespace: pgskipper

      - name: Sleep after services install
        run: sleep 10s

      - name: Verify Pgskipper Services installation
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          check_tests: ${{ matrix.test.check_services_tests }}
          namespace: pgskipper
          service_ready_max_retries: 240
          service_ready_retry_interval: 10s
          test_completion_max_retries: 240
          test_completion_retry_interval: 10s
          crd_list: patroniservices.netcracker.com

      - name: Collect Diagnostics Services installation
        if: ${{ !cancelled() && steps.services_install.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: pgskipper
          artifact_name: Services_Installation_${{ matrix.service_image }}_${{ matrix.test.artifact_name }}
          service_branch: ${{ matrix.test.install_version }}
      # == 03 End ======= Services installation steps =======

      # == Start ======= Specific steps for upgrade tests =======
      - name: Upgrade Pgskipper Core to [${{ matrix.test.upgrade_version }}]
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: core_upgrade
        with:
          deploy_mode: upgrade
          path_to_template: ${{ matrix.test.upgrade_core_template }}
          service_branch: ${{ matrix.test.upgrade_version }}
          restricted: ${{ matrix.test.restricted }}
          service_name: pgskipper
          repository_name: callmesi/pgskipper-operator
          path_to_chart: operator/charts/patroni-core
          namespace: pgskipper
          resource_folder: ""
          image_replacement: ${{ matrix.service_image }}

      - name: Sleep after core upgrade
        if: matrix.test.sequence == 'upgrade'
        run: sleep 10s

      - name: Verify Pgskipper Core upgrade
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          check_tests: ${{ matrix.test.check_core_tests }}
          namespace: pgskipper
          service_ready_max_retries: 60
          service_ready_retry_interval: 10s
          test_completion_max_retries: 60
          test_completion_retry_interval: 10s
          crd_list: patronicores.netcracker.com

      - name: Collect Diagnostics Core upgrade
        if: ${{ !cancelled() && steps.core_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: pgskipper
          artifact_name: Core_Upgrade_${{ matrix.service_image }}_${{ matrix.test.artifact_name }}
          service_branch: ${{ matrix.test.upgrade_version }}

      - name: Upgrade Pgskipper Services to [${{ matrix.test.upgrade_version }}]
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/helm_deploy
        id: services_upgrade
        with:
          deploy_mode: upgrade
          path_to_template: ${{ matrix.test.upgrade_services_template }}
          service_branch: ${{ matrix.test.upgrade_version }}
          service_name: pgskipper-services
          restricted: ${{ matrix.test.restricted }}
          repository_name: callmesi/pgskipper-operator
          path_to_chart: operator/charts/patroni-services
          namespace: pgskipper

      - name: Sleep after services upgrade
        if: matrix.test.sequence == 'upgrade'
        run: sleep 10s

      - name: Hardening Check
        if: inputs.scope == 'hardening'
        uses: netcracker/qubership-workflow-hub/actions/k8s-hardening-scan@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
        with:
          namespaces: pgskipper
          output-file: pgskipper-hardening-scan.json
          install-kubescape: true
          execute-trivy-scan: false
          fail-on-mandatory-checks: true
          config-file: ${{ inputs.repository_name }}/.github/hardening-config.yaml

      - name: Verify Pgskipper Services upgrade
        if: matrix.test.sequence == 'upgrade'
        uses: ./qubership-test-pipelines/actions/shared/verify_installation
        with:
          check_tests: ${{ matrix.test.check_services_tests }}
          namespace: pgskipper
          service_ready_max_retries: 60
          service_ready_retry_interval: 10s
          test_completion_max_retries: 60
          test_completion_retry_interval: 10s
          crd_list: patroniservices.netcracker.com

      - name: Collect Diagnostics Services installation
        if: ${{ !cancelled() && steps.services_upgrade.conclusion != 'skipped' }}
        uses: ./qubership-test-pipelines/actions/shared/collect_diag_info
        with:
          namespace: pgskipper
          artifact_name: Services_Upgrade_${{ matrix.service_image }}_${{ matrix.test.artifact_name }}
          service_branch: ${{ matrix.test.upgrade_version }}
      # == End ======= Specific steps for upgrade tests =======

      # == Start ======= Diagnostic steps =======
      - name: Collect diagnostic information
        if: always()
        run: |
          echo "::group::Describe nodes"
          kubectl describe nodes
          echo "::endgroup::"
          echo "::group::Get events"
          kubectl get events --sort-by=.metadata.creationTimestamp -n pgskipper
          echo "::endgroup::"
          echo "::group::Get pods"
          kubectl get pods -n pgskipper -o wide
          echo "::endgroup::"
      # == End ======= Diagnostic steps =======

  final-status-check:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [Pgskipper-Test-Cases]
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.pipeline_branch }}
          repository: netcracker/qubership-test-pipelines
          path: qubership-test-pipelines
          persist-credentials: false
      - name: Check job status
        uses: ./qubership-test-pipelines/actions/shared/check_job_status
        with:
          job_result: ${{ needs.Pgskipper-Test-Cases.result }}
